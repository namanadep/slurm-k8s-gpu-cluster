apiVersion: v1
kind: Secret
metadata:
  name: munge-key
  namespace: hpc
type: Opaque
data:
  # Base64-encoded 1024-byte random munge key.
  # Generate: dd if=/dev/urandom bs=1 count=1024 2>/dev/null | base64 -w 0
  # Then paste the output here as the value of munge.key.
  munge.key: PLACEHOLDER_REPLACE_WITH_BASE64_KEY
